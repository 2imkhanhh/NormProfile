<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nôrm Creative</title>
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div id="start-screen">
    <h1>Profile của Norm nèeeee</h1>
    <button id="btn-start">
      <img src="logo.png" alt="Logo" style="width: 32px; height: auto; object-fit: contain;">
      Mở xem Profile
    </button>
  </div>

  <div id="loading">
    <svg xmlns="http://www.w3.org/2000/svg" height="200px" width="200px" viewBox="0 0 200 200" class="pencil">
      <defs>
        <clipPath id="pencil-eraser">
          <rect height="30" width="30" ry="5" rx="5"></rect>
        </clipPath>
      </defs>
      <circle transform="rotate(-113,100,100)" stroke-linecap="round" stroke-dashoffset="439.82"
        stroke-dasharray="439.82 439.82" stroke-width="2" stroke="currentColor" fill="none" r="70"
        class="pencil__stroke"></circle>
      <g transform="translate(100,100)" class="pencil__rotate">
        <g fill="none">
          <circle transform="rotate(-90)" stroke-dashoffset="402" stroke-dasharray="402.12 402.12" stroke-width="30"
            stroke="hsl(223,90%,50%)" r="64" class="pencil__body1"></circle>
          <circle transform="rotate(-90)" stroke-dashoffset="465" stroke-dasharray="464.96 464.96" stroke-width="10"
            stroke="hsl(223,90%,60%)" r="74" class="pencil__body2"></circle>
          <circle transform="rotate(-90)" stroke-dashoffset="339" stroke-dasharray="339.29 339.29" stroke-width="10"
            stroke="hsl(223,90%,40%)" r="54" class="pencil__body3"></circle>
        </g>
        <g transform="rotate(-90) translate(49,0)" class="pencil__eraser">
          <g class="pencil__eraser-skew">
            <rect height="30" width="30" ry="5" rx="5" fill="hsl(223,90%,70%)"></rect>
            <rect clip-path="url(#pencil-eraser)" height="30" width="5" fill="hsl(223,90%,60%)"></rect>
            <rect height="20" width="30" fill="hsl(223,10%,90%)"></rect>
            <rect height="20" width="15" fill="hsl(223,10%,70%)"></rect>
            <rect height="20" width="5" fill="hsl(223,10%,80%)"></rect>
            <rect height="2" width="30" y="6" fill="hsla(223,10%,10%,0.2)"></rect>
            <rect height="2" width="30" y="13" fill="hsla(223,10%,10%,0.2)"></rect>
          </g>
        </g>
        <g transform="rotate(-90) translate(49,-30)" class="pencil__point">
          <polygon points="15 0,30 30,0 30" fill="hsl(33,90%,70%)"></polygon>
          <polygon points="15 0,6 30,0 30" fill="hsl(33,90%,50%)"></polygon>
          <polygon points="15 0,20 10,10 10" fill="hsl(223,10%,10%)"></polygon>
        </g>
      </g>
    </svg>
    <p>Chờ xíu nhaa^^...</p>
  </div>

  <div id="sidebar">
    <div class="sidebar-header">
      <strong>Mục lục trang</strong>
      <button id="close-sidebar"><span class="material-symbols-outlined">close</span></button>
    </div>
    <div id="thumbnail-container"></div>
  </div>

  <button id="arrow-prev" class="nav-arrow" style="display: none;"><span
      class="material-symbols-outlined">chevron_left</span></button>
  <button id="arrow-next" class="nav-arrow" style="display: none;"><span
      class="material-symbols-outlined">chevron_right</span></button>

  <!-- Mobile viewer: dùng riêng, không dùng PageFlip -->
  <div id="mobile-viewer" style="display:none;">
    <div id="mobile-page-container">
      <div id="mobile-page-inner">
        <canvas id="mobile-canvas-front"></canvas>
        <canvas id="mobile-canvas-back"></canvas>
      </div>
    </div>
  </div>

  <div id="zoom-wrapper">
    <div id="canvas-container"></div>
  </div>

  <div id="toolbar" style="display: none;">
    <button id="tb-prev"><span class="material-symbols-outlined">chevron_left</span></button>
    <div class="page-info">
      <input type="text" id="page-input" value="1"> / <span id="total-pages">0</span>
    </div>
    <button id="tb-next"><span class="material-symbols-outlined">chevron_right</span></button>

    <div class="divider"></div>

    <button id="btn-sound" title="Bật/Tắt âm thanh"><span class="material-symbols-outlined"
        id="sound-icon">volume_up</span></button>

    <button id="btn-thumbs" title="Xem danh sách trang"><span
        class="material-symbols-outlined">grid_view</span></button>
    <button id="btn-zoom-in" title="Phóng to"><span class="material-symbols-outlined">zoom_in</span></button>
    <button id="btn-zoom-out" title="Thu nhỏ"><span class="material-symbols-outlined">zoom_out</span></button>
    <button id="btn-fullscreen" title="Toàn màn hình"><span class="material-symbols-outlined">fullscreen</span></button>

    <button id="btn-download" title="Tải xuống PDF"><span class="material-symbols-outlined">download</span></button>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.min.js"></script>

  <script>
    const pdfUrl = 'Profile.pdf';
    const container = document.getElementById('canvas-container');
    const thumbContainer = document.getElementById('thumbnail-container');
    let pageFlipObj;

    const flipSound = new Audio('10-diem.mp3');
    flipSound.preload = 'auto';
    let isSoundEnabled = true;

    const loadingSound = new Audio('trinh-la-gi.mp3');
    loadingSound.loop = true;
    loadingSound.volume = 0.5;

    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

    const isMobile = window.innerWidth <= 768;

    // =========================================================
    // MOBILE: Tự làm flip animation đồng bộ, không dùng PageFlip
    // =========================================================
    let mobilePages = [];       // mảng ImageBitmap hoặc canvas dataURL
    let mobileCurrentPage = 0;
    let mobileIsFlipping = false;
    let mobilePdf = null;
    let mobilePageWidth, mobilePageHeight, mobileRenderScale;

    async function mobileRenderPageToCanvas(pageNum, canvas) {
      const page = await mobilePdf.getPage(pageNum);
      const viewport = page.getViewport({ scale: mobileRenderScale });
      canvas.width = viewport.width;
      canvas.height = viewport.height;
      await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;
    }

    async function mobileGoTo(targetPage, direction) {
      if (mobileIsFlipping) return;
      if (targetPage < 0 || targetPage >= mobilePages.length) return;
      if (targetPage === mobileCurrentPage) return;

      mobileIsFlipping = true;
      if (isSoundEnabled) {
        flipSound.currentTime = 0;
        flipSound.play().catch(() => { });
      }

      const inner = document.getElementById('mobile-page-inner');
      const front = document.getElementById('mobile-canvas-front');
      const back = document.getElementById('mobile-canvas-back');

      // Vẽ trang hiện tại lên front, trang đích lên back
      const ctx1 = front.getContext('2d');
      const ctx2 = back.getContext('2d');

      front.width = mobilePageWidth;
      front.height = mobilePageHeight;
      back.width = mobilePageWidth;
      back.height = mobilePageHeight;

      // Vẽ ảnh đã render sẵn
      const imgFront = new Image();
      const imgBack = new Image();

      await new Promise(res => { imgFront.onload = res; imgFront.src = mobilePages[mobileCurrentPage]; });
      await new Promise(res => { imgBack.onload = res; imgBack.src = mobilePages[targetPage]; });

      ctx1.drawImage(imgFront, 0, 0, mobilePageWidth, mobilePageHeight);
      ctx2.drawImage(imgBack, 0, 0, mobilePageWidth, mobilePageHeight);

      // Flip: front quay ra, back quay vào — cùng 1 kiểu animation
      inner.style.transition = 'none';
      inner.style.transform = direction === 'next' ? 'rotateY(0deg)' : 'rotateY(0deg)';

      // Set up: back bắt đầu ở vị trí ngược
      back.style.transform = direction === 'next' ? 'rotateY(180deg)' : 'rotateY(-180deg)';
      front.style.transform = 'rotateY(0deg)';

      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          inner.style.transition = 'transform 0.5s ease-in-out';
          inner.style.transform = direction === 'next' ? 'rotateY(-180deg)' : 'rotateY(180deg)';
        });
      });

      setTimeout(() => {
        mobileCurrentPage = targetPage;
        document.getElementById('page-input').value = mobileCurrentPage + 1;

        // Reset: hiện trang mới trên front, ẩn back
        ctx1.drawImage(imgBack, 0, 0, mobilePageWidth, mobilePageHeight);
        inner.style.transition = 'none';
        inner.style.transform = 'rotateY(0deg)';
        front.style.transform = 'rotateY(0deg)';
        back.style.transform = 'rotateY(180deg)';

        mobileIsFlipping = false;
      }, 520);
    }

    function mobilePrev() { mobileGoTo(mobileCurrentPage - 1, 'prev'); }
    function mobileNext() { mobileGoTo(mobileCurrentPage + 1, 'next'); }

    // =========================================================
    // INIT
    // =========================================================
    async function initFlipbook() {
      try {
        const pdf = await pdfjsLib.getDocument(pdfUrl).promise;
        const numPages = pdf.numPages;
        document.getElementById('total-pages').innerText = numPages;

        const firstPage = await pdf.getPage(1);
        const baseViewport = firstPage.getViewport({ scale: 1 });
        const pageAspect = baseViewport.height / baseViewport.width;
        const dpr = window.devicePixelRatio || 1;

        if (isMobile) {
          mobilePdf = pdf;
          mobilePageWidth = Math.floor(window.innerWidth * 0.92);
          mobilePageHeight = Math.floor(mobilePageWidth * pageAspect);
          mobileRenderScale = (mobilePageWidth / baseViewport.width) * dpr;

          // Render trước tất cả trang thành dataURL để flip nhanh
          for (let i = 1; i <= numPages; i++) {
            const offscreen = document.createElement('canvas');
            offscreen.width = Math.round(baseViewport.width * mobileRenderScale);
            offscreen.height = Math.round(baseViewport.height * mobileRenderScale);
            const page = await pdf.getPage(i);
            const vp = page.getViewport({ scale: mobileRenderScale });
            offscreen.width = vp.width;
            offscreen.height = vp.height;
            await page.render({ canvasContext: offscreen.getContext('2d'), viewport: vp }).promise;

            // Thumbnail
            const thumbImg = document.createElement('img');
            thumbImg.src = offscreen.toDataURL('image/jpeg', 0.5);
            const thumbDiv = document.createElement('div');
            thumbDiv.className = 'thumb-item';
            thumbDiv.innerHTML = `<span>Trang ${i}</span>`;
            thumbDiv.prepend(thumbImg);
            const pageIndex = i - 1;
            thumbDiv.onclick = () => {
              mobileGoTo(pageIndex, pageIndex > mobileCurrentPage ? 'next' : 'prev');
              document.getElementById('sidebar').classList.remove('active');
            };
            thumbContainer.appendChild(thumbDiv);

            mobilePages.push(offscreen.toDataURL('image/jpeg', 0.95));
          }

          // Setup mobile viewer
          document.getElementById('mobile-viewer').style.display = 'flex';
          const front = document.getElementById('mobile-canvas-front');
          const back = document.getElementById('mobile-canvas-back');
          const inner = document.getElementById('mobile-page-inner');

          front.style.width = mobilePageWidth + 'px';
          front.style.height = mobilePageHeight + 'px';
          back.style.width = mobilePageWidth + 'px';
          back.style.height = mobilePageHeight + 'px';
          inner.style.width = mobilePageWidth + 'px';
          inner.style.height = mobilePageHeight + 'px';
          document.getElementById('mobile-page-container').style.width = mobilePageWidth + 'px';
          document.getElementById('mobile-page-container').style.height = mobilePageHeight + 'px';

          // Vẽ trang đầu tiên
          front.width = mobilePageWidth; front.height = mobilePageHeight;
          back.width = mobilePageWidth; back.height = mobilePageHeight;
          back.style.transform = 'rotateY(180deg)';

          const imgFirst = new Image();
          await new Promise(res => { imgFirst.onload = res; imgFirst.src = mobilePages[0]; });
          front.getContext('2d').drawImage(imgFirst, 0, 0, mobilePageWidth, mobilePageHeight);

          // Touch swipe
          let touchStartX = 0, touchStartY = 0, isSwiping = false;
          const viewer = document.getElementById('mobile-viewer');
          viewer.addEventListener('touchstart', e => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
            isSwiping = false;
          }, { passive: true });
          viewer.addEventListener('touchmove', e => {
            const dx = Math.abs(e.touches[0].clientX - touchStartX);
            const dy = Math.abs(e.touches[0].clientY - touchStartY);
            if (dx > dy && dx > 10) isSwiping = true;
          }, { passive: true });
          viewer.addEventListener('touchend', e => {
            if (!isSwiping) return;
            const dx = e.changedTouches[0].clientX - touchStartX;
            if (Math.abs(dx) < 40) return;
            if (dx < 0) mobileNext(); else mobilePrev();
          }, { passive: true });

        } else {
          // DESKTOP: dùng PageFlip như cũ
          const pageWidth = 450, pageHeight = 636, renderScale = 1.5;

          for (let i = 1; i <= numPages; i++) {
            const page = await pdf.getPage(i);
            const viewport = page.getViewport({ scale: renderScale });
            const canvas = document.createElement('canvas');
            const context = canvas.getContext('2d');
            canvas.height = viewport.height;
            canvas.width = viewport.width;
            const pageDiv = document.createElement('div');
            pageDiv.className = 'page';
            pageDiv.appendChild(canvas);
            container.appendChild(pageDiv);
            await page.render({ canvasContext: context, viewport: viewport }).promise;

            const thumbImg = document.createElement('img');
            thumbImg.src = canvas.toDataURL('image/jpeg', 0.5);
            const thumbDiv = document.createElement('div');
            thumbDiv.className = 'thumb-item';
            thumbDiv.innerHTML = `<span>Trang ${i}</span>`;
            thumbDiv.prepend(thumbImg);
            thumbDiv.onclick = () => {
              pageFlipObj.turnToPage(i - 1);
              document.getElementById('sidebar').classList.remove('active');
            };
            thumbContainer.appendChild(thumbDiv);
          }

          pageFlipObj = new St.PageFlip(container, {
            width: pageWidth, height: pageHeight,
            size: "fixed", showCover: true,
            usePortrait: false,
            mobileScrollSupport: false,
            maxShadowOpacity: 0.5,
          });
          pageFlipObj.loadFromHTML(document.querySelectorAll('.page'));
          container.style.transform = 'translateX(-25%)';

          pageFlipObj.on('changeState', (e) => {
            if (e.data === 'flipping' && isSoundEnabled) {
              flipSound.currentTime = 0;
              flipSound.play().catch(() => { });
            }
          });
          pageFlipObj.on('flip', (e) => {
            let cp = e.data;
            document.getElementById('page-input').value = cp + 1;
            if (cp === 0) container.style.transform = 'translateX(-25%)';
            else if (cp === pageFlipObj.getPageCount() - 1 && pageFlipObj.getPageCount() % 2 === 0) container.style.transform = 'translateX(25%)';
            else container.style.transform = 'translateX(0)';
          });
        }

        document.getElementById('loading').style.display = 'none';
        loadingSound.pause();
        loadingSound.currentTime = 0;
        if (!isMobile) container.style.visibility = 'visible';

        document.getElementById('toolbar').style.display = 'flex';
        document.getElementById('arrow-prev').style.display = 'flex';
        document.getElementById('arrow-next').style.display = 'flex';

      } catch (error) {
        console.error("Lỗi: ", error);
        document.getElementById('loading').innerText = "Không thể tải PDF!";
        loadingSound.pause();
      }
    }

    document.getElementById('btn-start').onclick = () => {
      document.getElementById('start-screen').style.display = 'none';
      document.getElementById('loading').style.display = 'flex';
      if (isSoundEnabled) loadingSound.play();
      initFlipbook();
    };

    document.getElementById('arrow-prev').onclick = () => isMobile ? mobilePrev() : pageFlipObj.flipPrev();
    document.getElementById('arrow-next').onclick = () => isMobile ? mobileNext() : pageFlipObj.flipNext();
    document.getElementById('tb-prev').onclick = () => isMobile ? mobilePrev() : pageFlipObj.flipPrev();
    document.getElementById('tb-next').onclick = () => isMobile ? mobileNext() : pageFlipObj.flipNext();

    document.getElementById('page-input').addEventListener('change', (e) => {
      let pageNum = parseInt(e.target.value) - 1;
      if (isMobile) {
        mobileGoTo(pageNum, pageNum > mobileCurrentPage ? 'next' : 'prev');
      } else {
        if (pageNum >= 0 && pageNum < pageFlipObj.getPageCount()) pageFlipObj.turnToPage(pageNum);
      }
    });

    document.getElementById('btn-thumbs').onclick = () => document.getElementById('sidebar').classList.add('active');
    document.getElementById('close-sidebar').onclick = () => document.getElementById('sidebar').classList.remove('active');

    let currentZoom = 1;
    document.getElementById('btn-zoom-in').onclick = () => {
      currentZoom += 0.2;
      document.getElementById('zoom-wrapper').style.transform = `scale(${currentZoom})`;
    };
    document.getElementById('btn-zoom-out').onclick = () => {
      currentZoom = Math.max(0.5, currentZoom - 0.2);
      document.getElementById('zoom-wrapper').style.transform = `scale(${currentZoom})`;
    };

    document.getElementById('btn-fullscreen').onclick = () => {
      if (!document.fullscreenElement) document.documentElement.requestFullscreen();
      else document.exitFullscreen();
    };

    const btnSound = document.getElementById('btn-sound');
    const soundIcon = document.getElementById('sound-icon');
    btnSound.onclick = () => {
      isSoundEnabled = !isSoundEnabled;
      soundIcon.innerText = isSoundEnabled ? 'volume_up' : 'volume_off';
    };

    document.getElementById('btn-download').onclick = () => {
      const a = document.createElement('a');
      a.href = pdfUrl; a.download = 'Profile.pdf';
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
    };
  </script>
</body>

</html>
