<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <title>Nôrm Creative</title>
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div id="start-screen">
    <h1>Profile của Norm nèeeee</h1>
    <button id="btn-start">
      <img src="logo.png" alt="Logo" style="width: 32px; height: auto; object-fit: contain;">
      Mở xem Profile
    </button>
  </div>

  <div id="loading">Chờ xíu nhaa^^...</div>

  <div id="sidebar">
    <div class="sidebar-header">
      <strong>Mục lục trang</strong>
      <button id="close-sidebar"><span class="material-symbols-outlined">close</span></button>
    </div>
    <div id="thumbnail-container"></div>
  </div>

  <button id="arrow-prev" class="nav-arrow" style="display: none;"><span
      class="material-symbols-outlined">chevron_left</span></button>
  <button id="arrow-next" class="nav-arrow" style="display: none;"><span
      class="material-symbols-outlined">chevron_right</span></button>

  <div id="zoom-wrapper">
    <div id="canvas-container"></div>
  </div>

  <div id="toolbar" style="display: none;">
    <button id="tb-prev"><span class="material-symbols-outlined">chevron_left</span></button>
    <div class="page-info">
      <input type="text" id="page-input" value="1"> / <span id="total-pages">0</span>
    </div>
    <button id="tb-next"><span class="material-symbols-outlined">chevron_right</span></button>

    <div class="divider"></div>

    <button id="btn-sound" title="Bật/Tắt âm thanh"><span class="material-symbols-outlined"
        id="sound-icon">volume_up</span></button>

    <button id="btn-thumbs" title="Xem danh sách trang"><span
        class="material-symbols-outlined">grid_view</span></button>
    <button id="btn-zoom-in" title="Phóng to"><span class="material-symbols-outlined">zoom_in</span></button>
    <button id="btn-zoom-out" title="Thu nhỏ"><span class="material-symbols-outlined">zoom_out</span></button>
    <button id="btn-fullscreen" title="Toàn màn hình"><span class="material-symbols-outlined">fullscreen</span></button>

    <button id="btn-download" title="Tải xuống PDF"><span class="material-symbols-outlined">download</span></button>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.min.js"></script>

  <script>
    // ────────────────────────────────────────────────
    // CẤU HÌNH & BIẾN TOÀN CỤC
    // ────────────────────────────────────────────────
    const PDF_URL = 'Profile.pdf';
    const FLIP_SOUND_URL = '10-diem.mp3';
    const LOADING_SOUND_URL = 'trinh-la-gi.mp3';

    const container = document.getElementById('canvas-container');
    const thumbContainer = document.getElementById('thumbnail-container');

    let pageFlip = null;
    let pdfDocument = null;
    let isSoundEnabled = true;
    let currentZoom = 1;

    const flipSound = new Audio(FLIP_SOUND_URL);
    flipSound.preload = 'auto';

    const loadingSound = new Audio(LOADING_SOUND_URL);
    loadingSound.loop = true;
    loadingSound.volume = 0.5;

    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

    // ────────────────────────────────────────────────
    // PHÁT HIỆN MOBILE
    // ────────────────────────────────────────────────
    function isMobileDevice() {
      const mobileRegex = /Android|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i;
      const screenSmall = window.innerWidth < 896;
      return mobileRegex.test(navigator.userAgent) || screenSmall;
    }

    // ────────────────────────────────────────────────
    // KHỞI TẠO FLIPBOOK
    // ────────────────────────────────────────────────
    async function initFlipbook() {
      try {
        pdfDocument = await pdfjsLib.getDocument(PDF_URL).promise;
        const numPages = pdfDocument.numPages;
        document.getElementById('total-pages').textContent = numPages;

        // Render tất cả các trang
        for (let i = 1; i <= numPages; i++) {
          const page = await pdfDocument.getPage(i);
          const viewport = page.getViewport({ scale: 1.5 });

          const canvas = document.createElement('canvas');
          canvas.height = viewport.height;
          canvas.width = viewport.width;
          const context = canvas.getContext('2d');

          const pageDiv = document.createElement('div');
          pageDiv.className = 'page';
          pageDiv.appendChild(canvas);
          container.appendChild(pageDiv);

          await page.render({ canvasContext: context, viewport }).promise;

          // Tạo thumbnail
          const thumbImg = document.createElement('img');
          thumbImg.src = canvas.toDataURL('image/jpeg', 0.6);
          const thumbDiv = document.createElement('div');
          thumbDiv.className = 'thumb-item';
          thumbDiv.innerHTML = `<span>Trang ${i}</span>`;
          thumbDiv.prepend(thumbImg);

          thumbDiv.onclick = () => {
            if (pageFlip) pageFlip.turnToPage(i - 1);
            document.getElementById('sidebar').classList.remove('active');
          };
          thumbContainer.appendChild(thumbDiv);
        }

        // Ẩn loading, hiện nội dung
        document.getElementById('loading').style.display = 'none';
        loadingSound.pause();
        loadingSound.currentTime = 0;
        container.style.visibility = 'visible';
        document.getElementById('toolbar').style.display = 'flex';

        // Cấu hình page-flip
        const isMobile = isMobileDevice();

        let bookWidth = isMobile ? Math.min(window.innerWidth * 0.92, 520) : 450;
        let bookHeight = bookWidth * 1.414; // tỉ lệ A4

        pageFlip = new St.PageFlip(container, {
          width: bookWidth,
          height: bookHeight,
          size: "fixed",
          // QUAN TRỌNG: Ép chế độ 1 trang trên mobile
          mode: isMobile ? "portrait" : "double",
          usePortrait: isMobile,           // true → luôn 1 trang trên mobile
          showCover: !isMobile,
          maxShadowOpacity: 0.5,
          mobileScrollSupport: true,
          flippingTime: 700,
          drawShadow: true,
          startPage: 0,
        });

        pageFlip.loadFromHTML(document.querySelectorAll('.page'));

        // Căn giữa trên mobile
        if (isMobile) {
          container.style.transform = 'translateX(0)';
        } else {
          container.style.transform = 'translateX(-25%)';
        }

        // ── Sự kiện ─────────────────────────────────────
        pageFlip.on('flip', (e) => {
          const pageNum = e.data + 1;
          document.getElementById('page-input').value = pageNum;

          // Điều chỉnh vị trí container (chỉ desktop)
          if (!isMobile) {
            if (e.data === 0) {
              container.style.transform = 'translateX(-25%)';
            } else if (e.data === pageFlip.getPageCount() - 1 && pageFlip.getPageCount() % 2 === 0) {
              container.style.transform = 'translateX(25%)';
            } else {
              container.style.transform = 'translateX(0)';
            }
          }
        });

        pageFlip.on('changeState', (e) => {
          if (e.data === 'flipping' && isSoundEnabled) {
            flipSound.currentTime = 0;
            flipSound.play().catch(() => { });
          }
        });

      } catch (err) {
        console.error("Lỗi tải PDF:", err);
        document.getElementById('loading').textContent = "Không tải được PDF!";
        loadingSound.pause();
      }
    }

    // ────────────────────────────────────────────────
    // XỬ LÝ SỰ KIỆN
    // ────────────────────────────────────────────────

    // Nút bắt đầu
    document.getElementById('btn-start').onclick = () => {
      document.getElementById('start-screen').style.display = 'none';
      document.getElementById('loading').style.display = 'block';
      if (isSoundEnabled) loadingSound.play().catch(() => { });
      initFlipbook();
    };

    // Nút prev/next
    document.getElementById('arrow-prev').onclick =
      document.getElementById('tb-prev').onclick = () => pageFlip?.flipPrev();

    document.getElementById('arrow-next').onclick =
      document.getElementById('tb-next').onclick = () => pageFlip?.flipNext();

    // Nhảy trang bằng input
    document.getElementById('page-input').addEventListener('change', (e) => {
      let pageNum = parseInt(e.target.value) - 1;
      if (pageFlip && pageNum >= 0 && pageNum < pageFlip.getPageCount()) {
        pageFlip.turnToPage(pageNum);
      }
    });

    // Sidebar
    document.getElementById('btn-thumbs').onclick = () =>
      document.getElementById('sidebar').classList.add('active');

    document.getElementById('close-sidebar').onclick = () =>
      document.getElementById('sidebar').classList.remove('active');

    // Zoom
    document.getElementById('btn-zoom-in').onclick = () => {
      currentZoom += 0.15;
      document.getElementById('zoom-wrapper').style.transform = `scale(${currentZoom})`;
    };

    document.getElementById('btn-zoom-out').onclick = () => {
      currentZoom = Math.max(0.5, currentZoom - 0.15);
      document.getElementById('zoom-wrapper').style.transform = `scale(${currentZoom})`;
    };

    // Fullscreen
    document.getElementById('btn-fullscreen').onclick = () => {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen().catch(() => { });
      } else {
        document.exitFullscreen();
      }
    };

    // Âm thanh
    document.getElementById('btn-sound').onclick = () => {
      isSoundEnabled = !isSoundEnabled;
      document.getElementById('sound-icon').textContent = isSoundEnabled ? 'volume_up' : 'volume_off';
    };

    // Tải PDF
    document.getElementById('btn-download').onclick = () => {
      const a = document.createElement('a');
      a.href = PDF_URL;
      a.download = 'Profile_Norm.pdf';
      a.click();
    };

    // Xử lý resize (xoay màn hình)
    let resizeTimeout;
    window.addEventListener('resize', () => {
      clearTimeout(resizeTimeout);
      resizeTimeout = setTimeout(() => {
        // Nếu thay đổi từ mobile ↔ desktop → reload để init lại layout an toàn
        const nowMobile = isMobileDevice();
        if (pageFlip && nowMobile !== (pageFlip.getSettings().mode === 'portrait')) {
          location.reload();
        }
      }, 300);
    });

  </script>
</body>

</html>
